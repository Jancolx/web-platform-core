name: "1. AWS Infrastructure (Terraform)"
on:
  workflow_dispatch:
    inputs:
      target_resource:
        description: "What would you like to deploy/update?"
        required: true
        type: choice
        options:
          - all
          - network (ALB & Security Groups)
          - ECR & EC2_temp
          - DESTROY ALL

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.BUCKET_NAME }}"
      #Remove the dynamodb_table line entirely dynamodb_table = "terraform-lock"
      - name: Terraform Apply
        run: |
          if [ "${{ github.event.inputs.target_resource }}" == "network (ALB & Security Groups)" ]; then
            terraform apply -target=aws_lb.web_alb -target=aws_security_group.alb_sg -auto-approve
          elif [ "${{ github.event.inputs.target_resource }}" == "DESTROY ALL" ]; then
            terraform destroy -auto-approve
            aws s3 rm "s3://${{ secrets.BUCKET_NAME }}/terraform.tfstate"
          elif [ "${{ github.event.inputs.target_resource }}" == "ECR & EC2_temp" ]; then
            terraform apply -target=aws_launch_template.web_lt -target=aws_ecr_repository.web_app -auto-approve
          else
            terraform apply -auto-approve
          fi
