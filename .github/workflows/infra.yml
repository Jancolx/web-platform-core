name: "AWS Infrastructure (Terraform)"
on:
  workflow_dispatch:
    inputs:
      target_resource:
        description: "What would you like to deploy/update?"
        required: true
        type: choice
        options:
          - all
          - network (ALB & Security Groups)
          - compute (ASG & ECR)

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: |
          if [ "${{ github.event.inputs.target_resource }}" == "network (ALB & Security Groups)" ]; then
            terraform apply -target=aws_lb.web_alb -target=aws_security_group.alb_sg -auto-approve
          elif [ "${{ github.event.inputs.target_resource }}" == "compute (ASG & ECR)" ]; then
            terraform apply -target=aws_autoscaling_group.web_asg -target=aws_ecr_repository.web_app -auto-approve
          else
            terraform apply -auto-approve
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
